- defaults:
    link:
      create: true
      relink: true
      force: true

- clean: ['~', '~/.config']

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - [chmod +x z4h.sh && ./z4h.sh, Installing zsh4humans]

- link:
    $ZSH/plugins/zsh-completions: zsh/plugins/zsh-completions
    $ZSH/plugins/zsh-syntax-highlighting: zsh/plugins/zsh-syntax-highlighting
    $ZSH/plugins/zsh-autosuggestions: zsh/plugins/zsh-autosuggestions
    $ZSH/custom/themes/powerlevel10k: zsh/themes/powerlevel10k
    ~/.p10k.zsh: zsh/p10k.zsh
    ~/.shell:
    ~/.zshrc: zsh/zshrc
    ~/.zsh:
    ~/.gitconfig:
